{% extends "base.html" %}
{% block content %}
<h1 class="h1">Slots list</h1>
<table class="table table-striped table-bordered ">
    <tr>
        <th>Skill name</th>
        <th>Action</th>
    </tr>
    {% for skill in skills%}
    <tr>
        <td>{{ skill.name }}</td>
        <td>
            {% if user.is_authenticated %}
            <form method="post" action="{% url 'skillbook:my_skill_list' %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-info">Manage my skills</button>
            </form>
            {% else %}
            Please login to add to your skills or remove from them
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
