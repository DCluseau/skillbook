{% extends "base.html" %}
{% block content %}
<h1 class="h1">My skill list</h1>
<table class="table table-striped table-bordered ">
    <tr>
        <th>Skill name</th>
        <th>Action</th>
    </tr>
    {% for skill in user_skills%}
    <tr>
        <td>{{ skill.skill.name }}</td>
        <td>
            <form method="post" action="{% url 'skillbook:remove_my_skill' skill.skill.id %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Remove from my skills</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
