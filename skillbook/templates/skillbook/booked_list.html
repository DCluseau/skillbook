{% extends "base.html" %}
{% block content %}
<h1 class="h1">Booked slots list</h1>
<table class="table table-striped table-bordered ">
    <tr>
        <th>Author</th>
        <th>Skill</th>
        <th>Slot</th>
        <th>Booker</th>
    </tr>
    {% for booking in bookings%}
    <tr>
        <td>{{ booking.slot.user_skill.user.username }}</td>
        <td>{{ booking.slot.user_skill.skill.name }}</td>
        <td>{{ booking.slot.slot_date }}</td>
        <td>{{ booking.booker_user.username }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
